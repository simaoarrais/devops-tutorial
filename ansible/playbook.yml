---
- name: Configure web server and deploy Flask app
  hosts: webservers
  become: true   # use sudo
  vars:
    app_dir: /opt/flask-app
    app_user: flaskapp

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system packages
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - nginx
        state: present

    - name: Create app user
      user:
        name: "{{ app_user }}"
        system: yes
        shell: /bin/bash
        home: "{{ app_dir }}"

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"

    - name: Copy app files
      copy:
        src: "../app/"
        dest: "{{ app_dir }}/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
      notify: Restart flaskapp

    - name: Create Python virtualenv and install dependencies
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/venv"
        virtualenv_command: python3 -m venv

    - name: Create systemd service for Flask app
      copy:
        dest: /etc/systemd/system/flaskapp.service
        content: |
          [Unit]
          Description=Flask App
          After=network.target

          [Service]
          User={{ app_user }}
          WorkingDirectory={{ app_dir }}
          Environment="APP_VERSION=1.0.0"
          ExecStart={{ app_dir }}/venv/bin/python {{ app_dir }}/app.py
          Restart=always

          [Install]
          WantedBy=multi-user.target
      notify: Restart flaskapp

    - name: Enable and start Flask service
      systemd:
        name: flaskapp
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Configure nginx reverse proxy
      template:
        src: nginx.conf.j2
        dest: /etc/nginx/sites-available/flaskapp

    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/flaskapp
        dest: /etc/nginx/sites-enabled/flaskapp
        state: link

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Restart nginx
      service:
        name: nginx
        state: restarted

  handlers:
    - name: Restart flaskapp
      systemd:
        name: flaskapp
        state: restarted
        daemon_reload: yes